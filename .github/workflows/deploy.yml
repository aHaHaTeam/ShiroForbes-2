name: Deploy Test

on:
  push:
    branches:
      - github-ci
      - main 

jobs:
  test-ssh:
    runs-on: ubuntu-latest

    steps:
      - name: Execute SSH command
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "GitHub Actions connected successfully"
            whoami
            pwd
